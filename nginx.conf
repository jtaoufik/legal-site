server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Drop the .html suffix so /maze-glass/privacy serves privacy.html
    location / {
        try_files $uri $uri.html $uri/ $uri/index.html =404;
    }

    # Long cache for icons/static images, short for HTML so updates land fast
    location ~* \.(png|jpg|jpeg|svg|ico|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
}
