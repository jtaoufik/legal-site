<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Astral — PDF, JSON, Image & Text Tools</title>
<link rel="apple-touch-icon" href="/astral/apple-touch-icon.png">
<style>
  :root{ --ink:#0B0B0B; --pink:#EC4899; --bg:#FDF2F8; --card:#fff; --muted:#5b5b5b; }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center}
  .card{max-width:560px;margin:24px;padding:36px;background:var(--card);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink)}
  h1{font-size:40px;margin:0 0 6px;font-weight:800;letter-spacing:-1px}
  p{color:var(--muted);line-height:1.7}
  a{display:inline-block;margin-top:16px;margin-right:12px;color:#fff;background:var(--pink);
    border:3px solid var(--ink);box-shadow:4px 4px 0 var(--ink);padding:10px 18px;text-decoration:none;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <h1>ASTRAL</h1>
    <p>A fast, on-device toolkit for PDF, JSON, image, and text. Your files never leave your iPhone.</p>
    <a href="/astral/privacy.html">Privacy</a>
    <a href="/astral/support.html">Support</a>
  </div>
</body>
</html>
