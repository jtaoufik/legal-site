<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apps by Taoufik Jabbari — Bloom & more</title>
<meta name="description" content="Published apps by Taoufik Jabbari, including Bloom — an addictive offline merge puzzle game for iOS. Privacy and support pages for every app.">
<link rel="canonical" href="https://legal-site-iota-smoky.vercel.app/">
<meta property="og:title" content="Apps by Taoufik Jabbari">
<meta property="og:description" content="Bloom and other iOS apps.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#143829">
<style>
  :root{ --ink:#143829; --leaf:#1b8d4e; --bg:#f4faf4; --muted:#5e6e64; --line:#dbe7df; }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:64px 24px 96px}
  h1{font-size:36px;margin:0 0 8px;letter-spacing:-0.5px}
  .sub{color:var(--muted);font-size:16px;margin-bottom:40px}
  .apps{display:grid;gap:14px}
  .app{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:18px 22px;border:1px solid var(--line);border-radius:14px;text-decoration:none;color:var(--ink);transition:.15s}
  .app:hover{border-color:var(--leaf);transform:translateY(-1px)}
  .app .name{font-weight:600;font-size:18px}
  .app .desc{color:var(--muted);font-size:14px;margin-top:2px}
  .app .arrow{color:var(--leaf);font-size:20px}
  footer{margin-top:48px;color:var(--muted);font-size:14px;text-align:center}
  footer a{color:var(--leaf);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Apps by Taoufik Jabbari</h1>
  <p class="sub">Legal, privacy, and support pages for our published apps.</p>
  <div class="apps">
    <a class="app" href="/bloom/">
      <div>
        <div class="name">🌱 Bloom — Merge Puzzle Garden</div>
        <div class="desc">iOS · Privacy · Support · <a href="https://apps.apple.com/app/id6768495662" style="color:var(--leaf)">App Store</a></div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
  <footer>
    <p>Questions? Contact <a href="mailto:goloio32@gmail.com">goloio32@gmail.com</a></p>
  </footer>
</div>
</body>
</html>
